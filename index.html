<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рандомайзер Прославления</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 30px;
    background: #f4f6f8;
}
button {
    padding: 15px 30px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 8px;
    background: #2c7be5;
    color: white;
}
.result {
    margin-top: 30px;
    font-size: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    display: inline-block;
    min-width: 280px;
}
</style>
</head>
<body>

<h2>Рандомайзер Прославления</h2>
<button onclick="generate()">Запустить</button>

<div class="result">
    <p><strong>Хвалебные:</strong> <span id="praise">—</span></p>
    <p><strong>На Вечерю:</strong> <span id="supper">—</span></p>
    <p><strong>Поклонение:</strong> <span id="worship">—</span></p>
</div>

<script>

// === СПИСКИ (вставлены из вашего файла) ===

const praise = [
"Аллилуйя! Буду славить",
"Ангелы в небе",
"Благо есть славить Господа",
"Благодарю, Господь, за хлеб",
"Церковь Божия, все вместе",
"Чудный, Вечный Бог",
"Этот день сотворил Господь",
"Я взыскал Господа",
"Я нуждаюсь в Тебе"
];

const supper = [
"Бог пришёл и умер",
"В Христе Одном надежда есть",
"Воспряньте, воспойте",
"Господь — скала, мой Искупитель"
];

const worship = [
"Аллилуйя! Аллилуйя! Ты — наш Бог",
"Боже мой, на пути",
"Буду жить под защитой",
"Буду уповать на Тебя"
];

// === ОСНОВНАЯ ЛОГИКА ===

function randomItem(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function isThreeMonthsApart(date1, date2) {
    const diff = Math.abs(date1 - date2);
    const days = diff / (1000 * 60 * 60 * 24);
    return days >= 83 && days <= 97; // 90 дней ± неделя
}

function generate() {

    const history = JSON.parse(localStorage.getItem("history")) || [];
    const now = new Date();
    let attempt = 0;
    let result;

    do {
        result = {
            praise: randomItem(praise),
            supper: randomItem(supper),
            worship: randomItem(worship),
            date: now
        };
        attempt++;
    } while (
        history.some(entry =>
            isThreeMonthsApart(new Date(entry.date), now) &&
            entry.praise === result.praise &&
            entry.supper === result.supper &&
            entry.worship === result.worship
        ) && attempt < 50
    );

    history.push(result);
    localStorage.setItem("history", JSON.stringify(history));

    document.getElementById("praise").innerText = result.praise;
    document.getElementById("supper").innerText = result.supper;
    document.getElementById("worship").innerText = result.worship;
}

</script>

</body>
</html>
